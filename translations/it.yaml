contact:
  title: "Hai un Progetto in Mente?"
  subtitle: "Contattaci per realizzare insieme il tuo progetto personalizzato"
  disclaimer: "⚠️ IMPORTANTE: L'attività svolta è di carattere hobbistico e senza scopo di lucro. Gli oggetti creati sono offerti a prezzi contenuti in ragione della natura non professionale dell'attività. I tempi di realizzazione e di consegna non sono garantiti e possono variare in funzione della disponibilità e del numero di progetti in lavorazione; dopo l'accettazione del progetto, la consegna avverrà a tempo indeterminato, fermo restando che è possibile richiedere aggiornamenti sullo stato di avanzamento dei lavori. Il prezzo richiesto copre esclusivamente i materiali aggiuntivi che devono essere acquistati presso negozi o fornitori; su richiesta è possibile esibire le relative ricevute fiscali a dimostrazione dell'effettivo costo sostenuto per i materiali. Essendo l'attività priva di scopo di lucro, qualora un progetto risultasse oltre le competenze tecniche o le risorse disponibili, ci riserviamo il diritto di rifiutare l'incarico senza obbligo di accettazione. Accettando un ordine, il cliente prende atto e accetta le presenti condizioni; per qualsiasi chiarimento sulle tempistiche, sui materiali o sullo stato del progetto è possibile contattarci direttamente."
  why_title: "Vantaggi"
  benefit1: "Pezzi unici"
  benefit2: "Impatto ambientale minimo"
  benefit3: "Storia e carattere in ogni pezzo"
  benefit4: "Costi bassissimi"
