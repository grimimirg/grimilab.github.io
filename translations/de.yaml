  title: "Die Philosophie der Wiederverwendung"
  paragraph1: "In einer Gesellschaft, die ständig wegwirft und ersetzt, suchen wir den verborgenen Wert in vergessenen Gegenständen."
  paragraph2: "Diese Projekte entstehen aus verlassenen Paletten, alten Möbeln, Baustellenabfällen und allem, was unsere Konsumkultur als 'Müll' betrachtet. Mit Leidenschaft und Kreativität werden sie in einzigartige funktionale und dekorative Objekte verwandelt."
